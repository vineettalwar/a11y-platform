kind = "web"
previewPath = "/"
title = "OmniAccess"
version = "1.0.0"
id = "artifacts/omni-access"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24716

[services.development]
run = "pnpm --filter @workspace/omni-access run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omni-access", "run", "build" ]
publicDir = "artifacts/omni-access/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24716"
BASE_PATH = "/"
